syntax = "proto3";

package raft;

option java_package = "org.gautelis.raft.proto";
option java_multiple_files = true;
option java_outer_classname = "RaftProtos";
option optimize_for = LITE_RUNTIME;

message Envelope {
  string correlation_id = 1;
  string type = 2;
  bytes payload = 3;
}

message PeerSpec {
  string id = 1;
  string host = 2;
  int32 port = 3;
  string role = 4;
}

message PutCommand {
  string key = 1;
  string value = 2;
}

message DeleteCommand {
  string key = 1;
}

message ClearCommand {
}

message StateMachineCommand {
  oneof command {
    PutCommand put = 1;
    DeleteCommand delete = 2;
    ClearCommand clear = 3;
  }
}

message GetValueQuery {
  string key = 1;
}

message StateMachineQuery {
  oneof query {
    GetValueQuery get = 1;
  }
}

message GetValueResult {
  string key = 1;
  bool found = 2;
  string value = 3;
}

message StateMachineQueryResult {
  oneof result {
    GetValueResult get = 1;
  }
}

message JointConfigurationCommand {
  repeated PeerSpec members = 1;
}

message FinalizeConfigurationCommand {
}

message InternalRaftCommand {
  oneof command {
    JointConfigurationCommand joint = 1;
    FinalizeConfigurationCommand finalize = 2;
  }
}

message VoteRequest {
  int64 term = 1;
  string candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message VoteResponse {
  string peer_id = 1;
  int64 term = 2;
  bool vote_granted = 3;
  int64 current_term = 4;
}

message LogEntry {
  int64 term = 1;
  string peer_id = 2;
  bytes data = 3;
}

message AppendEntriesRequest {
  int64 term = 1;
  string leader_id = 2;
  int64 prev_log_index = 3;
  int64 prev_log_term = 4;
  int64 leader_commit = 5;
  repeated LogEntry entries = 6;
}

message AppendEntriesResponse {
  int64 term = 1;
  string peer_id = 2;
  bool success = 3;
  int64 match_index = 4;
}

message InstallSnapshotRequest {
  int64 term = 1;
  string leader_id = 2;
  int64 last_included_index = 3;
  int64 last_included_term = 4;
  int64 offset = 5;
  bytes snapshot_data = 6;
  bool done = 7;
}

message InstallSnapshotResponse {
  int64 term = 1;
  string peer_id = 2;
  bool success = 3;
  int64 last_included_index = 4;
}

message ClientCommandRequest {
  int64 term = 1;
  string peer_id = 2;
  bytes command = 3;
}

message ClientCommandResponse {
  int64 term = 1;
  string peer_id = 2;
  bool success = 3;
  string status = 4;
  string message = 5;
  string leader_id = 6;
  string leader_host = 7;
  int32 leader_port = 8;
}

message ClientQueryRequest {
  int64 term = 1;
  string peer_id = 2;
  bytes query = 3;
}

message ClientQueryResponse {
  int64 term = 1;
  string peer_id = 2;
  bool success = 3;
  string status = 4;
  string message = 5;
  string leader_id = 6;
  string leader_host = 7;
  int32 leader_port = 8;
  bytes result = 9;
}

message JoinClusterRequest {
  int64 term = 1;
  string peer_id = 2;
  string joining_peer_id = 3;
  string host = 4;
  int32 port = 5;
  string role = 6;
}

message JoinClusterResponse {
  int64 term = 1;
  string peer_id = 2;
  bool success = 3;
  string status = 4;
  string message = 5;
  string leader_id = 6;
}

message JoinClusterStatusRequest {
  int64 term = 1;
  string peer_id = 2;
  string target_peer_id = 3;
}

message JoinClusterStatusResponse {
  int64 term = 1;
  string peer_id = 2;
  bool success = 3;
  string status = 4;
  string message = 5;
  string leader_id = 6;
}

message ReconfigureClusterRequest {
  int64 term = 1;
  string peer_id = 2;
  string action = 3;
  repeated PeerSpec members = 4;
}

message ReconfigureClusterResponse {
  int64 term = 1;
  string peer_id = 2;
  bool success = 3;
  string status = 4;
  string message = 5;
  string leader_id = 6;
}

message TelemetryRequest {
  int64 term = 1;
  string peer_id = 2;
  bool include_peer_stats = 3;
  bool require_leader_summary = 4;
}

message TelemetryPeerStats {
  string peer_id = 1;
  int64 samples = 2;
  double mean_millis = 3;
  double min_millis = 4;
  double max_millis = 5;
  double cv_percent = 6;
}

message TelemetryReplicationStatus {
  string peer_id = 1;
  int64 next_index = 2;
  int64 match_index = 3;
  bool reachable = 4;
  int64 last_successful_contact_millis = 5;
  int32 consecutive_failures = 6;
  int64 last_failed_contact_millis = 7;
}

message ClusterSummaryRequest {
  int64 term = 1;
  string peer_id = 2;
}

message ReconfigurationStatusRequest {
  int64 term = 1;
  string peer_id = 2;
}

message ClusterMemberSummary {
  string peer_id = 1;
  bool local = 2;
  bool current_member = 3;
  bool next_member = 4;
  bool voting = 5;
  string role = 6;
  string current_role = 7;
  string next_role = 8;
  string role_transition = 9;
  int64 transition_age_millis = 10;
  string blocking_quorums = 11;
  string blocking_reason = 12;
  bool reachable = 13;
  string freshness = 14;
  string health = 15;
  int64 next_index = 16;
  int64 match_index = 17;
  int64 lag = 18;
  int32 consecutive_failures = 19;
  int64 last_successful_contact_millis = 20;
  int64 last_failed_contact_millis = 21;
}

message ClusterSummaryResponse {
  int64 observed_at_millis = 1;
  int64 term = 2;
  string peer_id = 3;
  bool success = 4;
  string status = 5;
  string redirect_leader_id = 6;
  string redirect_leader_host = 7;
  int32 redirect_leader_port = 8;
  string state = 9;
  string leader_id = 10;
  bool joint_consensus = 11;
  string cluster_health = 12;
  string cluster_status_reason = 13;
  bool quorum_available = 14;
  bool current_quorum_available = 15;
  bool next_quorum_available = 16;
  int32 voting_members = 17;
  int32 healthy_voting_members = 18;
  int32 reachable_voting_members = 19;
  int64 reconfiguration_age_millis = 20;
  repeated string blocking_current_quorum_peer_ids = 21;
  repeated string blocking_next_quorum_peer_ids = 22;
  repeated ClusterMemberSummary members = 23;
}

message ReconfigurationStatusResponse {
  int64 observed_at_millis = 1;
  int64 term = 2;
  string peer_id = 3;
  bool success = 4;
  string status = 5;
  string redirect_leader_id = 6;
  string redirect_leader_host = 7;
  int32 redirect_leader_port = 8;
  string state = 9;
  string leader_id = 10;
  bool reconfiguration_active = 11;
  bool joint_consensus = 12;
  int64 reconfiguration_age_millis = 13;
  string cluster_health = 14;
  string cluster_status_reason = 15;
  bool quorum_available = 16;
  bool current_quorum_available = 17;
  bool next_quorum_available = 18;
  repeated string blocking_current_quorum_peer_ids = 19;
  repeated string blocking_next_quorum_peer_ids = 20;
  repeated ClusterMemberSummary members = 21;
}

message TelemetryResponse {
  int64 observed_at_millis = 1;
  int64 term = 2;
  string peer_id = 3;
  bool success = 4;
  string status = 5;
  string redirect_leader_id = 6;
  string state = 7;
  string leader_id = 8;
  string voted_for = 9;
  bool joining = 10;
  bool decommissioned = 11;
  int64 commit_index = 12;
  int64 last_applied = 13;
  int64 last_log_index = 14;
  int64 last_log_term = 15;
  int64 snapshot_index = 16;
  int64 snapshot_term = 17;
  int64 last_heartbeat_millis = 18;
  int64 next_election_deadline_millis = 19;
  bool joint_consensus = 20;
  repeated PeerSpec current_members = 21;
  repeated PeerSpec next_members = 22;
  repeated PeerSpec known_peers = 23;
  repeated string pending_join_ids = 24;
  repeated TelemetryReplicationStatus replication = 25;
  repeated TelemetryPeerStats peer_stats = 26;
  string cluster_health = 27;
  bool quorum_available = 28;
  bool current_quorum_available = 29;
  bool next_quorum_available = 30;
  int32 voting_members = 31;
  int32 healthy_voting_members = 32;
  int32 reachable_voting_members = 33;
  string cluster_status_reason = 34;
  repeated string blocking_current_quorum_peer_ids = 35;
  repeated string blocking_next_quorum_peer_ids = 36;
  repeated ClusterMemberSummary cluster_members = 37;
  int64 reconfiguration_age_millis = 38;
}
