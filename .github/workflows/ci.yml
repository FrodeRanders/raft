name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VOPN_REPO: https://github.com/FrodeRanders/java-vopn.git
  VOPN_VERSION: 3.0-SNAPSHOT

jobs:
  # ------------------------------------------------------------------
  # Java: build and unit tests
  # ------------------------------------------------------------------
  java:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Build vopn dependency
        run: |
          git clone --depth 1 "${VOPN_REPO}" /tmp/java-vopn
          cd /tmp/java-vopn
          mvn -B --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true

      - name: Java build and unit tests
        run: mvn -B --no-transfer-progress clean verify -DskipJepsenTests=true -Dmaven.javadoc.skip=true

  # ------------------------------------------------------------------
  # C++: build, unit tests, and two-port smoke (C++ ↔ Java)
  # ------------------------------------------------------------------
  cpp:
    runs-on: ubuntu-24.04
    needs: java
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Install C++ build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libprotobuf-dev protobuf-compiler libboost-dev libabsl-dev ninja-build catch2

      - name: Build vopn dependency
        run: |
          git clone --depth 1 "${VOPN_REPO}" /tmp/java-vopn
          cd /tmp/java-vopn
          mvn -B --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true

      - name: Configure C++
        run: cmake -S graft-cpp -B graft-cpp/build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build C++
        run: cmake --build graft-cpp/build --target graft_smoke

      - name: Build C++ tests
        run: cmake --build graft-cpp/build --target graft_unit_tests

      - name: C++ unit tests
        run: ctest --test-dir graft-cpp/build --output-on-failure

      - name: Maven install Java artifacts for probes
        run: mvn -B --no-transfer-progress install -DskipTests -DskipJepsenTests=true -Dmaven.javadoc.skip=true

      - name: C++ ↔ Java two-port smoke
        run: cd graft-cpp && ./run-mixed-suite.sh

  # ------------------------------------------------------------------
  # Rust: build, unit tests, and two-port smoke (Rust ↔ Java)
  # ------------------------------------------------------------------
  rust:
    runs-on: ubuntu-24.04
    needs: java
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('graft-rust/Cargo.lock') }}

      - name: Build vopn dependency
        run: |
          git clone --depth 1 "${VOPN_REPO}" /tmp/java-vopn
          cd /tmp/java-vopn
          mvn -B --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true

      - name: Rust build
        run: cd graft-rust && cargo build

      - name: Rust unit tests
        run: cd graft-rust && cargo test

      - name: Maven install Java artifacts for probes
        run: mvn -B --no-transfer-progress install -DskipTests -DskipJepsenTests=true -Dmaven.javadoc.skip=true

      - name: Rust ↔ Java two-port smoke
        run: cd graft-rust/tests/scripts && ./run-mixed-suite.sh

  # ------------------------------------------------------------------
  # Three-port smoke: Java + C++ + Rust
  # ------------------------------------------------------------------
  three-port-smoke:
    runs-on: ubuntu-24.04
    needs: [java, cpp, rust]
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Install C++ build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libprotobuf-dev protobuf-compiler libboost-dev libabsl-dev ninja-build catch2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build vopn dependency
        run: |
          git clone --depth 1 "${VOPN_REPO}" /tmp/java-vopn
          cd /tmp/java-vopn
          mvn -B --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true

      - name: Build C++
        run: cmake -S graft-cpp -B graft-cpp/build -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build graft-cpp/build --target graft_smoke

      - name: Build Rust
        run: cd graft-rust && cargo build

      - name: Maven install Java artifacts for probes
        run: mvn -B --no-transfer-progress install -DskipTests -DskipJepsenTests=true -Dmaven.javadoc.skip=true

      - name: Three-port smoke (Java ↔ C++ ↔ Rust)
        run: bash scripts/run-three-port-smoke.sh

